<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Routine Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0ede8;--text2:#a09d98;--text3:#6b6865;--green:#4ade80;--gdim:rgba(74,222,128,0.12);--red:#f87171;--amber:#fbbf24;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.logo{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
.week-nav{display:flex;align-items:center;gap:6px;}
.week-label{font-size:12px;color:var(--text2);font-family:var(--mono);min-width:160px;text-align:center;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-info{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;flex-shrink:0;}
.sdot.ok{background:var(--green);}
.sdot.err{background:var(--red);}
.sdot.spin{background:var(--amber);animation:p 1s infinite;}
@keyframes p{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn{padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap;}
.btn:hover{background:var(--bg4);}
.btn-green{background:var(--gdim);border-color:rgba(74,222,128,0.3);color:var(--green);}
.btn-sm{padding:4px 8px;font-size:11px;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-section{padding:14px;border-bottom:0.5px solid var(--border);}
.sidebar-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.idea-add{display:flex;gap:6px;margin-bottom:8px;}
.idea-add input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 8px;outline:none;}
.idea-add input:focus{border-color:var(--green);}
.color-picker{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.cp{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cp.sel{border-color:white;}
.ideas-list{display:flex;flex-direction:column;gap:4px;overflow-y:auto;max-height:260px;}
.idea-card{padding:6px 8px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid;display:flex;align-items:center;justify-content:space-between;gap:4px;}
.idea-card:hover{opacity:0.8;}
.idea-card span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.idea-del{background:none;border:none;color:inherit;cursor:pointer;opacity:0.5;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0;}
.week-stats{padding:14px;flex:1;overflow-y:auto;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;}
.sbar-bg{background:var(--bg3);border-radius:3px;height:3px;margin-top:2px;overflow:hidden;}
.sbar-fill{height:3px;border-radius:3px;transition:width 0.3s;}
.grid-area{flex:1;overflow:auto;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);min-height:100%;}
.day-col{border-right:0.5px solid var(--border);display:flex;flex-direction:column;}
.day-col:last-child{border-right:none;}
.day-header{padding:10px 10px 8px;border-bottom:0.5px solid var(--border);flex-shrink:0;position:sticky;top:0;background:var(--bg2);z-index:10;}
.day-header.today{background:rgba(74,222,128,0.04);}
.day-name{font-size:12px;font-weight:600;color:var(--text2);}
.day-header.today .day-name{color:var(--green);}
.day-date{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px;}
.day-score-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.day-score{font-size:10px;font-family:var(--mono);}
.dsbar-bg{flex:1;background:var(--bg3);border-radius:3px;height:3px;overflow:hidden;}
.dsbar-fill{height:3px;border-radius:3px;transition:width 0.3s;}
.day-body{flex:1;padding:6px;display:flex;flex-direction:column;gap:4px;}
.day-body.drag-over{background:rgba(74,222,128,0.04);}
.add-task-btn{width:100%;padding:5px;border-radius:var(--r);border:0.5px dashed var(--border2);background:none;color:var(--text3);font-family:var(--font);font-size:11px;cursor:pointer;text-align:center;margin-top:2px;flex-shrink:0;}
.add-task-btn:hover{border-color:var(--green);color:var(--green);}

/* TASK CARD */
.task-card{border-radius:var(--r);padding:8px 8px 6px;border:0.5px solid;font-size:12px;font-weight:500;position:relative;flex-shrink:0;transition:opacity 0.15s;}
.task-card.done{opacity:0.4;}
.task-card.done .task-title{text-decoration:line-through;}
.task-title{line-height:1.3;word-break:break-word;padding-right:36px;}
.task-label{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
.task-time-badge{font-size:10px;font-family:var(--mono);opacity:0.75;background:rgba(0,0,0,0.2);padding:1px 5px;border-radius:4px;}
.task-recur-badge{font-size:9px;font-family:var(--mono);opacity:0.6;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:4px;}
/* Always visible action buttons */
.task-actions{position:absolute;top:5px;right:5px;display:flex;gap:3px;}
.task-btn{width:18px;height:18px;border-radius:4px;border:none;background:rgba(0,0,0,0.35);color:rgba(255,255,255,0.7);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-btn:hover{background:rgba(0,0,0,0.6);color:white;}
.task-check{cursor:pointer;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:14px;padding:20px;width:320px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;}
.mf{margin-bottom:10px;}
.ml{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.mi{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 10px;width:100%;outline:none;}
.mi:focus{border-color:var(--green);}
select.mi option{background:var(--bg3);}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-actions .btn{flex:1;}

/* CUSTOM DAYS PICKER — large tap targets */
.days-picker{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.day-pick-btn{padding:7px 10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);font-size:12px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.day-pick-btn.active{background:var(--gdim);border-color:rgba(74,222,128,0.4);color:var(--green);}

.assign-days{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
.assign-day-btn{padding:8px 4px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);font-size:11px;cursor:pointer;text-align:center;}
.assign-day-btn:hover{border-color:var(--green);color:var(--green);}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--gdim);border:0.5px solid rgba(74,222,128,0.3);color:var(--green);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- TASK MODAL -->
<div class="modal-bg" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="task-modal-title">Add Task</div>
    <div class="mf"><div class="ml">Title</div><input class="mi" id="t-title" placeholder="e.g. Morning run"></div>
    <div class="mf"><div class="ml">Time (optional)</div><input class="mi" id="t-time" type="time"></div>
    <div class="mf"><div class="ml">Duration (minutes)</div><input class="mi" id="t-dur" type="number" placeholder="30" min="5" step="5"></div>
    <div class="mf"><div class="ml">Colour</div><div class="color-picker" id="task-colors"></div></div>
    <div class="mf">
      <div class="ml">Repeat</div>
      <select class="mi" id="t-recur" onchange="onRecurChange()">
        <option value="none">No repeat</option>
        <option value="daily">Daily</option>
        <option value="weekdays">Weekdays (Mon–Fri)</option>
        <option value="weekly">Weekly (same day)</option>
        <option value="custom">Custom days</option>
      </select>
    </div>
    <div id="custom-days-wrap" style="display:none">
      <div class="ml">Select days</div>
      <div class="days-picker" id="days-picker"></div>
    </div>
    <div id="end-date-wrap" style="display:none">
      <div class="mf"><div class="ml">End repeat (optional)</div><input class="mi" id="t-end-date" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-green" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- ASSIGN MODAL -->
<div class="modal-bg" id="assign-modal">
  <div class="modal">
    <div class="modal-title" id="assign-title">Add to day</div>
    <div class="ml" style="margin-bottom:6px">Pick a day</div>
    <div class="assign-days" id="assign-days"></div>
    <div class="mf" style="margin-top:12px"><div class="ml">Time (optional)</div><input class="mi" id="assign-time" type="time"></div>
    <div class="mf"><div class="ml">Duration (minutes)</div><input class="mi" id="assign-dur" type="number" placeholder="30" min="5" step="5"></div>
    <div class="modal-actions"><button class="btn" onclick="closeAssignModal()">Cancel</button></div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Routine</div>
    <div class="week-nav">
      <button class="btn btn-sm" onclick="changeWeek(-1)">&#8592;</button>
      <div class="week-label" id="week-label"></div>
      <button class="btn btn-sm" onclick="changeWeek(1)">&#8594;</button>
      <button class="btn btn-sm" onclick="goToday()">Today</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="sync-info"><span class="sdot" id="sdot"></span><span id="sstat">Not synced</span></div>
    <button class="btn btn-sm btn-green" onclick="syncAll()">Sync</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Idea Bank</div>
      <div class="idea-add">
        <input id="idea-inp" placeholder="Add idea..." onkeydown="if(event.key==='Enter')addIdea()">
        <button class="btn btn-sm btn-green" onclick="addIdea()">+</button>
      </div>
      <div class="color-picker" id="idea-colors"></div>
      <div class="ideas-list" id="ideas-list"></div>
    </div>
    <div class="week-stats" id="week-stats"></div>
  </div>
  <div class="grid-area">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const SB='https://edajjvqjgmqqvtbutaei.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYWpqdnFqZ21xcXZ0YnV0YWVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODQ0NTAsImV4cCI6MjA5NjA2MDQ1MH0.8ekp6PDyaBpMKslTz_5vY-bUcyxxx4KQJvWbSRWw_CA';
const COLORS=['#4ade80','#60a5fa','#c084fc','#f472b6','#fb923c','#fbbf24','#f87171','#34d399','#818cf8','#38bdf8'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const BASE_H=44;

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSync(s,m){const d=document.getElementById('sdot'),t=document.getElementById('sstat');if(!d||!t)return;d.className='sdot'+(s==='ok'?' ok':s==='err'?' err':s==='spin'?' spin':'');t.textContent=m;}

async function sbGet(tbl,p=''){const r=await fetch(`${SB}/rest/v1/${tbl}?${p}`,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});if(!r.ok)throw new Error('GET '+r.status);return r.json();}
async function sbUpsert(tbl,rows){if(!rows||!rows.length)return;const r=await fetch(`${SB}/rest/v1/${tbl}`,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows)});if(!r.ok)throw new Error('UPSERT '+r.status+' '+(await r.text()));}
async function sbDelete(tbl,id){await fetch(`${SB}/rest/v1/${tbl}?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}});}

function taskToRow(t){return{id:t.id>0?t.id:undefined,day:t.day,start_time:t.time||'',duration:t.dur||30,title:t.title,category:JSON.stringify({recur:t.recur||'none',customDays:t.customDays||[]}),color:t.color,completed:t.done,week_start:t.week};}
function rowToTask(r){let recur='none',customDays=[];try{const c=JSON.parse(r.category||'{}');recur=c.recur||'none';customDays=c.customDays||[];}catch(e){}return{id:r.id,day:r.day,time:r.start_time,dur:r.duration,title:r.title,color:r.color,done:r.completed,week:r.week_start,recur,customDays};}

async function syncAll(){
  setSync('spin','Syncing...');
  try{
    const tu=tasks.filter(t=>t.id>0);if(tu.length)await sbUpsert('routine_blocks',tu.map(taskToRow));
    const iu=ideas.filter(i=>i.id>0);if(iu.length)await sbUpsert('routine_ideas',iu.map(i=>({id:i.id,title:i.title,category:'',color:i.color})));
    const td=await sbGet('routine_blocks','order=id.asc');if(td&&td.length){tasks=td.map(rowToTask);save('rp_tasks',tasks);}
    const id=await sbGet('routine_ideas','order=id.asc');if(id&&id.length){ideas=id.map(i=>({id:i.id,title:i.title,color:i.color}));save('rp_ideas',ideas);}
    setSync('ok','Synced '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}));
    toast('Synced');render();
  }catch(e){setSync('err','Sync failed: '+(e.message||'').slice(0,40));console.error(e);}
}

// STATE
let tasks=load('rp_tasks',[]);
let ideas=load('rp_ideas',[]);
let weekOff=0;
let selColor=COLORS[0];
let ideaColor=COLORS[0];
let editTask=null;
let pendingDay=null;
let assignIdea=null;
let localId=-1;
let customDaysSel=[];

// Give every loaded task a uid if missing
tasks.forEach(t=>{if(!t.uid)t.uid='u'+Math.random().toString(36).slice(2);});
save('rp_tasks',tasks);

function weekStart(off=weekOff){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+(off*7));return d;}
function weekKey(off=weekOff){return weekStart(off).toISOString().split('T')[0];}
function getDays(off=weekOff){const ws=weekStart(off);return Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});}
function isToday(d){return d.toDateString()===new Date().toDateString();}
function fmtDate(d){return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
function changeWeek(dir){weekOff+=dir;render();}
function goToday(){weekOff=0;render();}
function timeToMin(t){if(!t||!t.includes(':'))return 9999;const[h,m]=t.split(':').map(Number);return h*60+m;}
function taskHeight(dur){return Math.max(40,Math.round(((dur||30)/30)*BASE_H));}

function recurLabel(t){
  if(!t.recur||t.recur==='none')return '';
  if(t.recur==='daily')return 'daily';
  if(t.recur==='weekdays')return 'weekdays';
  if(t.recur==='weekly')return 'weekly';
  if(t.recur==='custom')return(t.customDays||[]).map(i=>DAYS[i]).join(', ');
  return '';
}

// A recurring task instance key: taskId + dayIdx + weekKey
function instanceKey(taskId,dayIdx,wk){return `done_${taskId}_${dayIdx}_${wk}`;}
function isInstanceDone(t,dayIdx,wk){
  // For the original placement week+day, use t.done
  if(t.day===String(dayIdx)&&t.week===wk)return t.done;
  // For recurring instances on other days/weeks, use localStorage
  return load(instanceKey(t.id,dayIdx,wk),false);
}
function setInstanceDone(t,dayIdx,wk,val){
  if(t.day===String(dayIdx)&&t.week===wk){t.done=val;save('rp_tasks',tasks);if(t.id>0)sbUpsert('routine_blocks',[taskToRow(t)]).catch(()=>{});}
  else{save(instanceKey(t.id,dayIdx,wk),val);}
}

function taskVisibleOnDay(t,dayIdx,off=weekOff){
  const wk=weekKey(off);
  const days=getDays(off);
  const dayDate=days[dayIdx];
  // Check end date
  if(t.endDate&&dayDate>new Date(t.endDate+'T23:59:59'))return false;
  if(t.day===String(dayIdx)&&t.week===wk)return true;
  if(!t.recur||t.recur==='none')return false;
  if(t.recur==='daily')return true;
  if(t.recur==='weekdays')return dayIdx>=1&&dayIdx<=5;
  if(t.recur==='weekly')return dayIdx===parseInt(t.day);
  if(t.recur==='custom')return(t.customDays||[]).includes(dayIdx);
  return false;
}

function getTasksForDay(dayIdx){
  return tasks.filter(t=>taskVisibleOnDay(t,dayIdx)).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
}
function getDayScore(dayIdx){
  const wk=weekKey();
  const ts=tasks.filter(t=>taskVisibleOnDay(t,dayIdx));
  if(!ts.length)return null;
  const done=ts.filter(t=>isInstanceDone(t,dayIdx,wk)).length;
  return Math.round(done/ts.length*100);
}
function scoreColor(p){return p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)';}

function render(){
  renderGrid();renderIdeas();renderStats();
  const ws=weekStart();const we=new Date(ws);we.setDate(ws.getDate()+6);
  document.getElementById('week-label').textContent=`${fmtDate(ws)} — ${fmtDate(we)}`;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  getDays().forEach((d,i)=>{
    const score=getDayScore(i);const pct=score!==null?score:0;
    const col=document.createElement('div');col.className='day-col';
    col.innerHTML=`
      <div class="day-header${isToday(d)?' today':''}">
        <div class="day-name">${DAYS[i]}</div>
        <div class="day-date">${fmtDate(d)}</div>
        ${score!==null?`<div class="day-score-row"><span class="day-score" style="color:${scoreColor(pct)}">${pct}%</span><div class="dsbar-bg"><div class="dsbar-fill" style="width:${pct}%;background:${scoreColor(pct)}"></div></div></div>`:''}
      </div>
      <div class="day-body" id="body-${i}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event,${i})">
        ${renderTaskCards(i)}
        <button class="add-task-btn" onclick="openTaskModal(${i})">+ add task</button>
      </div>`;
    grid.appendChild(col);
  });
}

function renderTaskCards(dayIdx){
  const wk=weekKey();
  return getTasksForDay(dayIdx).map(t=>{
    const done=isInstanceDone(t,dayIdx,wk);
    const h=taskHeight(t.dur);
    const rl=recurLabel(t);
    const timeLbl=t.time?t.time:'';
    const durLbl=t.dur?t.dur+'min':'';
    const metaLbl=[timeLbl,durLbl].filter(Boolean).join(' · ');
    return`<div class="task-card${done?' done':''}" style="background:${t.color}18;border-color:${t.color}44;color:${t.color};min-height:${h}px" data-uid="${t.uid}" data-day="${dayIdx}">
      <div class="task-actions">
        <button class="task-btn task-check" data-action="toggle" data-uid="${t.uid}" data-day="${dayIdx}" title="${done?'Unmark':'Complete'}">${done?'↩':'✓'}</button>
        <button class="task-btn" data-action="edit" data-uid="${t.uid}" title="Edit">✎</button>
        <button class="task-btn" data-action="delete" data-uid="${t.uid}" title="Delete">✕</button>
      </div>
      <div class="task-title">${t.title}</div>
      ${metaLbl||rl?`<div class="task-label">
        ${metaLbl?`<span class="task-time-badge">${metaLbl}</span>`:''}
        ${rl?`<span class="task-recur-badge">${rl}</span>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function toggleInstance(uid,dayIdx){
  const t=tasks.find(x=>x.uid===uid);if(!t)return;
  const wk=weekKey();const cur=isInstanceDone(t,dayIdx,wk);
  setInstanceDone(t,dayIdx,wk,!cur);render();
}

function deleteTask(uid){
  const t=tasks.find(x=>x.uid===uid);
  tasks=tasks.filter(x=>x.uid!==uid);save('rp_tasks',tasks);
  if(t&&t.id>0)sbDelete('routine_blocks',t.id).catch(()=>{});
  render();
}

// TASK MODAL
function onRecurChange(){
  const v=document.getElementById('t-recur').value;
  document.getElementById('custom-days-wrap').style.display=v==='custom'?'block':'none';
  document.getElementById('end-date-wrap').style.display=v!=='none'?'block':'none';
}

function renderDaysPicker(){
  document.getElementById('days-picker').innerHTML=DAYS.map((d,i)=>`<button type="button" class="day-pick-btn${customDaysSel.includes(i)?' active':''}" onclick="toggleCustomDay(${i})">${d}</button>`).join('');
}

function toggleCustomDay(i){
  if(customDaysSel.includes(i)){customDaysSel=customDaysSel.filter(x=>x!==i);}
  else{customDaysSel=[...customDaysSel,i];}
  renderDaysPicker();
}

function openTaskModal(dayIdx){
  pendingDay=dayIdx;editTask=null;
  document.getElementById('task-modal-title').textContent='Add Task';
  document.getElementById('t-title').value='';
  document.getElementById('t-time').value='';
  document.getElementById('t-dur').value='';
  document.getElementById('t-recur').value='none';
  document.getElementById('custom-days-wrap').style.display='none';
  document.getElementById('end-date-wrap').style.display='none';
  document.getElementById('t-end-date').value='';
  customDaysSel=[];
  selColor=COLORS[0];renderTaskColors();renderDaysPicker();
  document.getElementById('task-modal').classList.add('show');
  setTimeout(()=>document.getElementById('t-title').focus(),100);
}
function openEditTask(uid){
  const t=tasks.find(x=>x.uid===uid);if(!t)return;
  editTask=t;pendingDay=parseInt(t.day);
  document.getElementById('task-modal-title').textContent='Edit Task';
  document.getElementById('t-title').value=t.title;
  document.getElementById('t-time').value=t.time||'';
  document.getElementById('t-dur').value=t.dur||'';
  document.getElementById('t-recur').value=t.recur||'none';
  document.getElementById('t-end-date').value=t.endDate||'';
  customDaysSel=[...(t.customDays||[])];
  document.getElementById('custom-days-wrap').style.display=t.recur==='custom'?'block':'none';
  document.getElementById('end-date-wrap').style.display=(t.recur&&t.recur!=='none')?'block':'none';
  selColor=t.color;renderTaskColors();renderDaysPicker();
  document.getElementById('task-modal').classList.add('show');
  setTimeout(()=>document.getElementById('t-title').focus(),100);
}
function closeTaskModal(){document.getElementById('task-modal').classList.remove('show');editTask=null;pendingDay=null;}
function renderTaskColors(){document.getElementById('task-colors').innerHTML=COLORS.map(c=>`<div class="cp${c===selColor?' sel':''}" style="background:${c}" onclick="selColor='${c}';renderTaskColors()"></div>`).join('');}

function saveTask(){
  const title=document.getElementById('t-title').value.trim();
  if(!title){toast('Enter a title');return;}
  const time=document.getElementById('t-time').value;
  const dur=parseInt(document.getElementById('t-dur').value)||null;
  const recur=document.getElementById('t-recur').value;
  const customDays=recur==='custom'?[...customDaysSel]:[];
  const endDate=document.getElementById('t-end-date').value||null;
  if(editTask){
    Object.assign(editTask,{title,time,dur,color:selColor,recur,customDays,endDate});
    save('rp_tasks',tasks);
    if(editTask.id>0)sbUpsert('routine_blocks',[taskToRow(editTask)]).catch(()=>{});
  }else{
    const uid='u'+Math.random().toString(36).slice(2);
    const nt={id:localId--,uid,day:String(pendingDay),time,dur,title,color:selColor,done:false,week:weekKey(),recur,customDays,endDate};
    tasks.push(nt);save('rp_tasks',tasks);
    sbUpsert('routine_blocks',[{day:nt.day,start_time:time,duration:dur||30,title,category:JSON.stringify({recur,customDays}),color:selColor,completed:false,week_start:nt.week}])
      .then(async()=>{try{const d=await sbGet('routine_blocks','order=id.desc&limit=1');if(d&&d[0])nt.id=d[0].id;save('rp_tasks',tasks);}catch(e){}})
      .catch(()=>{});
  }
  closeTaskModal();render();
}

// IDEAS
function renderIdeaColors(){document.getElementById('idea-colors').innerHTML=COLORS.map(c=>`<div class="cp${c===ideaColor?' sel':''}" style="background:${c};margin-bottom:6px" onclick="ideaColor='${c}';renderIdeaColors()"></div>`).join('');}
function addIdea(){
  const inp=document.getElementById('idea-inp');const title=inp.value.trim();if(!title)return;
  const idea={id:localId--,title,color:ideaColor};
  ideas.push(idea);save('rp_ideas',ideas);
  sbUpsert('routine_ideas',[{title,category:'',color:ideaColor}])
    .then(async()=>{try{const d=await sbGet('routine_ideas','order=id.desc&limit=1');if(d&&d[0])idea.id=d[0].id;save('rp_ideas',ideas);}catch(e){}}).catch(()=>{});
  inp.value='';renderIdeas();toast('Idea added');
}
function deleteIdea(id){ideas=ideas.filter(i=>i.id!==id);save('rp_ideas',ideas);if(id>0)sbDelete('routine_ideas',id).catch(()=>{});renderIdeas();}
function renderIdeas(){
  const list=document.getElementById('ideas-list');
  if(!ideas.length){list.innerHTML='<div style="font-size:11px;color:var(--text3);padding:4px 0">No ideas yet.</div>';return;}
  list.innerHTML=ideas.map(i=>`<div class="idea-card" style="background:${i.color}18;border-color:${i.color}44;color:${i.color}" onclick="openAssignModal(${i.id})" draggable="true" ondragstart="dragIdea(event,${i.id})"><span>${i.title}</span><button class="idea-del" onclick="event.stopPropagation();deleteIdea(${i.id})">×</button></div>`).join('');
}

let dragIdeaId=null;
function dragIdea(e,id){dragIdeaId=id;e.dataTransfer.effectAllowed='copy';}
function handleDrop(e,dayIdx){
  e.preventDefault();
  document.getElementById('body-'+dayIdx)?.classList.remove('drag-over');
  if(dragIdeaId===null)return;
  const idea=ideas.find(i=>i.id===dragIdeaId);if(!idea)return;
  const nt={id:localId--,uid:'u'+Math.random().toString(36).slice(2),day:String(dayIdx),time:'',dur:null,title:idea.title,color:idea.color,done:false,week:weekKey(),recur:'none',customDays:[],endDate:null};
  tasks.push(nt);save('rp_tasks',tasks);
  sbUpsert('routine_blocks',[{day:nt.day,start_time:'',duration:30,title:nt.title,category:JSON.stringify({recur:'none',customDays:[]}),color:nt.color,completed:false,week_start:nt.week}])
    .then(async()=>{try{const d=await sbGet('routine_blocks','order=id.desc&limit=1');if(d&&d[0])nt.id=d[0].id;save('rp_tasks',tasks);}catch(e){}}).catch(()=>{});
  dragIdeaId=null;render();toast('Added to '+DAYS[dayIdx]);
}

function openAssignModal(id){
  assignIdea=ideas.find(i=>i.id===id);if(!assignIdea)return;
  document.getElementById('assign-title').textContent=`Add "${assignIdea.title}" to...`;
  document.getElementById('assign-time').value='';
  document.getElementById('assign-dur').value='';
  const days=getDays();
  document.getElementById('assign-days').innerHTML=DAYS.map((d,i)=>`<button class="assign-day-btn" onclick="assignToDay(${i})">${d}<br><span style="font-size:9px;opacity:0.6">${fmtDate(days[i])}</span></button>`).join('');
  document.getElementById('assign-modal').classList.add('show');
}
function closeAssignModal(){document.getElementById('assign-modal').classList.remove('show');assignIdea=null;}
function assignToDay(dayIdx){
  if(!assignIdea)return;
  const time=document.getElementById('assign-time').value;
  const dur=parseInt(document.getElementById('assign-dur').value)||null;
  const nt={id:localId--,uid:'u'+Math.random().toString(36).slice(2),day:String(dayIdx),time,dur,title:assignIdea.title,color:assignIdea.color,done:false,week:weekKey(),recur:'none',customDays:[],endDate:null};
  tasks.push(nt);save('rp_tasks',tasks);
  sbUpsert('routine_blocks',[{day:nt.day,start_time:time,duration:dur||30,title:nt.title,category:JSON.stringify({recur:'none',customDays:[]}),color:nt.color,completed:false,week_start:nt.week}])
    .then(async()=>{try{const d=await sbGet('routine_blocks','order=id.desc&limit=1');if(d&&d[0])nt.id=d[0].id;save('rp_tasks',tasks);}catch(e){}}).catch(()=>{});
  closeAssignModal();render();toast('Added to '+DAYS[dayIdx]);
}

function renderStats(){
  document.getElementById('week-stats').innerHTML=`<div class="sidebar-title" style="margin-bottom:10px">This week</div>`+getDays().map((d,i)=>{
    const score=getDayScore(i);const pct=score!==null?score:0;const sc=scoreColor(pct);
    return`<div class="stat-row"><span style="color:${isToday(d)?'var(--green)':'var(--text2)'};font-size:12px">${DAYS[i]}</span><span style="font-family:var(--mono);font-size:11px;color:${score!==null?sc:'var(--text3)'}">${score!==null?score+'%':'—'}</span></div>${score!==null?`<div class="sbar-bg"><div class="sbar-fill" style="width:${pct}%;background:${sc}"></div></div>`:''}`; 
  }).join('');
}

// EVENT DELEGATION — handles clicks on dynamically rendered task buttons
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  e.stopPropagation();
  const action=btn.dataset.action;
  const uid=btn.dataset.uid;
  const day=parseInt(btn.dataset.day);
  if(action==='toggle')toggleInstance(uid,day);
  else if(action==='edit')openEditTask(uid);
  else if(action==='delete')deleteTask(uid);
});

renderIdeaColors();renderTaskColors();renderDaysPicker();render();syncAll();
</script>
</body>
</html>
